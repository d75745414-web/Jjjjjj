<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Zypher</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://cdn.discordapp.com/attachments/1479158504186056798/1482134577530011819/1772804508926.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
:root{--theme:#4c6fff}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#05070d;color:white;display:flex;min-height:100vh;overflow:hidden}
.auth-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0a0e1a,#05070d);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-container{text-align:center;width:100%;max-width:380px;padding:40px 30px}
input{width:100%;padding:14px;border-radius:12px;border:none;background:#0c1224;color:white;margin-bottom:15px}
button{width:100%;padding:14px;background:var(--theme);border:none;border-radius:12px;color:white;cursor:pointer}
#dashboard{display:none;width:100%;height:100vh}
.main{flex:1;padding:30px}
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:25px}
.gamecard{position:relative;border-radius:20px;overflow:hidden;background:#000;height:200px}
.gamecard img{width:100%;height:100%;object-fit:cover;filter:brightness(.6)}
.gamecontent{position:absolute;bottom:0;padding:20px}
.gametitle{font-size:20px;font-weight:600}
.launch{margin-top:10px;background:var(--theme);border:none;padding:8px 14px;border-radius:20px;color:white}
</style>
</head>
<body>

<div id="login-screen" class="auth-screen">
<div class="login-container">
<input id="loginUsername" placeholder="Username">
<input id="loginPassword" placeholder="Password" type="password">
<button onclick="login()">Login</button>
</div>
</div>

<div id="dashboard">
<div class="main">
<div id="gamesContent" class="games"></div>
</div>
</div>

<script>
function login(){
document.getElementById("login-screen").style.display="none";
document.getElementById("dashboard").style.display="flex";
loadGames();
}

async function loadGames(){
const container=document.getElementById("gamesContent");
container.innerHTML="";
try{
const res=await fetch("/api/games");
const data=await res.json();
const games=data.games||[];

if(games.length===0){
container.innerHTML='<p style="text-align:center;color:white;">No games found</p>';
return;
}

for(const game of games){
let imageUrl="https://via.placeholder.com/768x432/111/eee?text=No+Thumbnail";
try{
const t=await fetch(`https://thumbnails.roblox.com/v1/places/gameicons?placeIds=${game.placeId}&size=512x512&format=Png&isCircular=false`);
const j=await t.json();
if(j.data&&j.data[0]&&j.data[0].imageUrl) imageUrl=j.data[0].imageUrl;
}catch{}

const card=`
<div class="gamecard">
<img src="${imageUrl}">
<div class="gamecontent">
<div class="gametitle">${game.name}</div>
<a href="https://www.roblox.com/games/${game.placeId}" target="_blank">
<button class="launch">Launch Game</button>
</a>
</div>
</div>
`;

container.insertAdjacentHTML("beforeend",card);
}
}catch{
container.innerHTML='<p style="color:red;text-align:center;">Failed to load</p>';
}
}

setInterval(loadGames,60000);
</script>

</body>
</html>
